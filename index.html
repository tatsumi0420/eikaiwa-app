<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>英会話アプリ</title>
    <link rel="manifest" href="manifest.json">
    <script src="vocab.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー */
        .header {
            padding: 12px 16px;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 18px; }
        .header button {
            background: none;
            border: 1px solid #555;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        /* チャットエリア */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            word-break: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: #0f3460;
            border-bottom-right-radius: 4px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #2a2a4a;
            border-bottom-left-radius: 4px;
        }
        .msg .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        .msg.ai .speak-btn {
            display: inline-block;
            margin-top: 6px;
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .typing {
            align-self: flex-start;
            color: #888;
            font-style: italic;
            font-size: 14px;
        }

        /* 入力エリア */
        .input-area {
            padding: 12px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #eee;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }
        .input-area textarea::placeholder { color: #666; }
        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #e94560;
            color: white;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .input-area button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .input-area .mic-btn {
            background: #333;
        }
        .input-area .mic-btn.recording {
            background: #e94560;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 設定モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 16px; font-size: 18px; }
        .modal label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #aaa;
        }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #eee;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .modal .btn-row button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .modal .btn-save { background: #e94560; color: white; }
        .modal .btn-cancel { background: #333; color: #ccc; }

        /* 初期設定画面 */
        .setup {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 英語劇モード */
        .drama-script {
            background: #0f3460;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.8;
        }
        .drama-script .drama-title {
            font-size: 13px;
            color: #e94560;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .drama-line {
            padding: 4px 0;
        }
        .drama-line .role {
            font-weight: bold;
            color: #aaa;
        }
        .drama-line.my-role .role {
            color: #e94560;
        }
        .drama-line.my-role {
            color: #fff;
        }
        .drama-status {
            text-align: center;
            padding: 8px;
            font-size: 13px;
            color: #888;
        }
        .drama-next-btn {
            display: block;
            margin: 12px auto;
            padding: 10px 24px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
        }

        /* 単語学習モード */
        .vocab-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
        }
        .vocab-cat-btn {
            padding: 8px 14px;
            border-radius: 16px;
            border: 1px solid #444;
            background: #1a1a2e;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
        }
        .vocab-cat-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }
        .vocab-card {
            background: #2a2a4a;
            border-radius: 16px;
            padding: 20px;
            margin: 12px 16px;
            text-align: center;
        }
        .vocab-ja {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #fff;
        }
        .vocab-hidden {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vocab-reveal-btn {
            padding: 10px 28px;
            background: #0f3460;
            border: none;
            color: #ccc;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
        }
        .vocab-en-list {
            text-align: left;
            margin-top: 8px;
        }
        .vocab-en-section {
            margin-bottom: 12px;
        }
        .vocab-en-section .section-label {
            font-size: 12px;
            color: #e94560;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .vocab-en-item {
            padding: 6px 0;
            font-size: 15px;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .vocab-en-item .speak-icon {
            cursor: pointer;
            font-size: 16px;
            color: #888;
        }
        .vocab-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px;
        }
        .vocab-nav button {
            padding: 10px 24px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .vocab-nav .btn-prev { background: #333; color: #ccc; }
        .vocab-nav .btn-next { background: #e94560; color: white; }
        .vocab-progress {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 4px;
        }
        .vocab-okng {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0 8px;
        }
        .vocab-okng button {
            padding: 12px 32px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .vocab-okng .btn-ok {
            background: #1b4332;
            color: #52b788;
        }
        .vocab-okng .btn-ng {
            background: #4a1525;
            color: #e94560;
        }
        .vocab-srs-info {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 4px;
        }
        .vocab-due-badge {
            display: inline-block;
            background: #e94560;
            color: white;
            border-radius: 10px;
            padding: 1px 7px;
            font-size: 11px;
            margin-left: 4px;
            vertical-align: middle;
        }
        .vocab-score {
            text-align: center;
            font-size: 13px;
            color: #888;
            padding: 4px;
        }

        /* 学習記録・ストリーク */
        .streak-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            background: #16213e;
            font-size: 13px;
            color: #aaa;
        }
        .streak-fire { font-size: 18px; }
        .streak-count { color: #e94560; font-weight: bold; font-size: 16px; }
        .streak-calendar {
            display: flex;
            gap: 3px;
            justify-content: center;
            padding: 4px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }
        .streak-day {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            background: #2a2a4a;
        }
        .streak-day.done {
            background: #52b788;
        }
        .streak-day.today {
            border: 1px solid #e94560;
        }
    </style>
</head>
<body>
    <!-- 初期設定 or チャット画面 -->
    <div id="app"></div>

    <!-- 設定モーダル -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>設定</h2>
            <label>Groq APIキー</label>
            <input type="password" id="s-apikey" placeholder="gsk_...">
            <label>モード</label>
            <select id="s-mode">
                <option value="drama">英語劇</option>
                <option value="vocab">単語学習</option>
            </select>
            <label>音声入力の言語</label>
            <select id="s-mic-lang">
                <option value="ja-JP">日本語</option>
                <option value="en-US">英語 (US)</option>
                <option value="en-GB">英語 (UK)</option>
            </select>
            <label>音声出力の言語</label>
            <select id="s-voice-lang">
                <option value="ja-JP">日本語</option>
                <option value="en-US">英語 (US)</option>
                <option value="en-GB">英語 (UK)</option>
            </select>
            <label>音声スピード</label>
            <input type="range" id="s-speed" min="0.5" max="2.0" step="0.1" value="1.0">
            <span id="s-speed-label">1.0x</span>
            <div class="btn-row">
                <button class="btn-cancel" onclick="doLogout()" style="color:#e94560;">ログアウト</button>
                <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
                <button class="btn-save" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
    // --- パスワード認証 ---
    const PASSWORD_HASH = '00fcb2d718c2116664250ce295b3d7d73ed9285609d6fef71233da70f637bd65';

    async function hashPassword(pw) {
        const data = new TextEncoder().encode(pw);
        const buf = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function isAuthenticated() {
        return localStorage.getItem('eikaiwa_auth') === 'ok';
    }

    async function doLogin() {
        const pw = document.getElementById('login-pw').value;
        const hash = await hashPassword(pw);
        if (hash === PASSWORD_HASH) {
            localStorage.setItem('eikaiwa_auth', 'ok');
            render();
        } else {
            document.getElementById('login-error').textContent = 'パスワードが違います';
        }
    }

    function renderLogin(app) {
        app.innerHTML = `
            <div class="setup">
                <div class="modal" style="position:static;">
                    <h2>英会話アプリ</h2>
                    <label>パスワード</label>
                    <input type="password" id="login-pw" placeholder="パスワードを入力"
                        onkeydown="if(event.key==='Enter')doLogin()">
                    <p id="login-error" style="color:#e94560;font-size:13px;margin:-10px 0 10px;"></p>
                    <div class="btn-row">
                        <button class="btn-save" onclick="doLogin()">ログイン</button>
                    </div>
                </div>
            </div>`;
    }

    // --- 設定管理 ---
    const DEFAULT_SETTINGS = {
        apiKey: '',
        mode: 'drama',
        micLang: 'en-US',
        voiceLang: 'en-US',
        speed: 1.0,
    };

    function loadSettings() {
        try {
            return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem('eikaiwa_settings')) };
        } catch { return { ...DEFAULT_SETTINGS }; }
    }
    function saveSettingsToStorage(s) {
        localStorage.setItem('eikaiwa_settings', JSON.stringify(s));
    }

    let settings = loadSettings();
    let messages = [];
    let isGenerating = false;

    // --- システムプロンプト ---
    function getSystemPrompt(mode) {
        switch (mode) {
            case 'drama':
                return ''; // ドラマモードは専用ロジックで処理
            case 'vocab':
                return ''; // 単語学習モードは専用ロジックで処理
            default:
                return '';
        }
    }

    // --- 英語劇モード ---
    let dramaState = null; // { script: [...], userRole: 'A'|'B', step: 0 }

    async function callGroqNonStream(msgs) {
        const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${settings.apiKey}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: msgs,
                stream: false,
            }),
        });
        if (!resp.ok) throw new Error(`API Error ${resp.status}`);
        const data = await resp.json();
        return data.choices[0].message.content;
    }

    async function startDrama() {
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = '<div class="drama-status">台本を生成中...</div>';

        try {
            const scriptText = await callGroqNonStream([
                { role: 'system', content: `You are a script writer. Generate a short casual Japanese conversation between two friends (A and B). Exactly 4 lines (A, B, A, B). Use casual/informal Japanese (タメ口), like real friends talking.

Output ONLY in this exact JSON format, no other text:
{"lines":[{"role":"A","ja":"..."},{"role":"B","ja":"..."},{"role":"A","ja":"..."},{"role":"B","ja":"..."}],"scene":"...場面の説明..."}` },
                { role: 'user', content: 'Generate a new conversation script between friends. Pick a random casual scenario (making weekend plans, talking about a movie, complaining about work, recommending a restaurant, sharing gossip, gaming, etc). Use natural casual Japanese like close friends would speak.' }
            ]);

            // JSONを抽出
            const jsonMatch = scriptText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('台本の生成に失敗しました');
            const script = JSON.parse(jsonMatch[0]);

            // 先行/後攻をランダムに決定
            const userRole = Math.random() < 0.5 ? 'A' : 'B';

            dramaState = {
                script: script.lines,
                scene: script.scene,
                userRole: userRole,
                step: 0,
                results: [],
            };

            renderDramaScript();
        } catch (err) {
            chatArea.innerHTML = `<div class="drama-status">[エラー] ${err.message}</div>
                <button class="drama-next-btn" onclick="startDrama()">リトライ</button>`;
        }
    }

    function renderDramaScript() {
        const chatArea = document.getElementById('chatArea');
        const ds = dramaState;

        let linesHtml = '';
        for (const line of ds.script) {
            const isMine = line.role === ds.userRole;
            linesHtml += `<div class="drama-line ${isMine ? 'my-role' : ''}">
                <span class="role">${line.role}${isMine ? ' (あなた)' : ' (AI)'}:</span> ${escapeHtml(line.ja)}
            </div>`;
        }

        chatArea.innerHTML = `
            <div class="drama-script">
                <div class="drama-title">台本 - ${escapeHtml(ds.scene || '日常会話')}</div>
                ${linesHtml}
            </div>
            <div class="drama-status">あなたは <b>${ds.userRole}</b> 役です。この台本を英語で演じましょう！</div>
        `;

        // 最初のターンを開始
        proceedDramaTurn();
    }

    async function proceedDramaTurn() {
        const ds = dramaState;
        if (ds.step >= ds.script.length) {
            // 全ターン完了 → 結果表示
            showDramaResults();
            return;
        }

        const currentLine = ds.script[ds.step];
        const chatArea = document.getElementById('chatArea');

        if (currentLine.role === ds.userRole) {
            // ユーザーのターン
            const statusDiv = document.createElement('div');
            statusDiv.className = 'drama-status';
            statusDiv.innerHTML = `<b>あなたのターン (${currentLine.role}):</b> 「${escapeHtml(currentLine.ja)}」を英語で言ってください`;
            chatArea.appendChild(statusDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            // ユーザーの入力を待つ（sendMessageで処理）
        } else {
            // AIのターン → 自動で英訳して発話
            const aiEnglish = await callGroqNonStream([
                { role: 'system', content: 'Translate the following Japanese sentence to natural English. Output ONLY the English translation, nothing else.' },
                { role: 'user', content: currentLine.ja }
            ]);

            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = `<div class="label">AI (${currentLine.role})</div><div class="text">${escapeHtml(aiEnglish)}</div>
                <button class="speak-btn" onclick="speakText(this)">&#128264; 再生</button>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            speak(aiEnglish, 'en-US', settings.speed);

            ds.step++;
            // 少し待ってから次のターン
            setTimeout(() => proceedDramaTurn(), 1500);
        }
    }

    async function handleDramaInput(text) {
        const ds = dramaState;
        const currentLine = ds.script[ds.step];
        const chatArea = document.getElementById('chatArea');

        // ユーザーの発言を表示
        appendMessage('user', text);

        // AIに評価させる
        isGenerating = true;
        document.getElementById('sendBtn').disabled = true;

        try {
            const evaluation = await callGroqNonStream([
                { role: 'system', content: `あなたは英語の先生です。生徒の英語が元の日本語の意味を伝えられているか評価してください。

元の日本語: 「${currentLine.ja}」
生徒の発言: 「${text}」

重要なルール:
- 句読点（カンマ、ピリオド等）の有無は無視してください。音声入力のため句読点がないのは正常です。
- 大文字小文字の違いも無視してください。
- 意味が伝わるかどうかだけで判定してください。

以下の形式で日本語で回答してください:
模範解答: (自然な英語訳)
判定: 「通じる」または「通じない」
コメント: (通じる場合は一言褒める。通じない場合はなぜ通じないのかを具体的に日本語で説明。1〜2文で。)` },
                { role: 'user', content: text }
            ]);

            const evalDiv = document.createElement('div');
            evalDiv.className = 'msg ai';
            evalDiv.innerHTML = `<div class="label">評価</div><div class="text">${escapeHtml(evaluation)}</div>`;
            chatArea.appendChild(evalDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            ds.results.push({ ja: currentLine.ja, userSaid: text, evaluation });
            recordActivity('drama', 1);
            updateStreakDisplay();

        } catch (err) {
            appendMessage('ai', `[エラー] ${err.message}`);
        }

        isGenerating = false;
        document.getElementById('sendBtn').disabled = false;

        ds.step++;
        setTimeout(() => proceedDramaTurn(), 1500);
    }

    function showDramaResults() {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'drama-status';
        div.innerHTML = `<b>お疲れ様でした！</b><br><br>
            <button class="drama-next-btn" onclick="startNewDrama()">次の台本へ</button>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function startNewDrama() {
        dramaState = null;
        messages = [];
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = '';
        startDrama();
    }

    // --- 学習記録・ストリーク ---
    function getToday() {
        return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    }

    function loadStudyLog() {
        try { return JSON.parse(localStorage.getItem('eikaiwa_study_log')) || {}; } catch { return {}; }
    }

    function saveStudyLog(log) {
        localStorage.setItem('eikaiwa_study_log', JSON.stringify(log));
    }

    function recordActivity(mode, count) {
        const log = loadStudyLog();
        const today = getToday();
        if (!log[today]) log[today] = {};
        if (!log[today][mode]) log[today][mode] = 0;
        log[today][mode] += count;
        saveStudyLog(log);
    }

    function getStreak() {
        const log = loadStudyLog();
        const today = new Date();
        let streak = 0;
        for (let i = 0; i < 365; i++) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            if (log[key]) {
                streak++;
            } else if (i > 0) {
                break;
            } else {
                break; // 今日まだやってなければ昨日から数える
            }
        }
        // 今日まだやってない場合、昨日から数える
        if (!log[getToday()]) {
            streak = 0;
            for (let i = 1; i < 365; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const key = d.toISOString().slice(0, 10);
                if (log[key]) { streak++; } else { break; }
            }
        }
        return streak;
    }

    function renderStreakBar() {
        const log = loadStudyLog();
        const today = new Date();
        const streak = getStreak();

        let days = '';
        for (let i = 13; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            const done = log[key] ? 'done' : '';
            const isToday = i === 0 ? 'today' : '';
            days += `<div class="streak-day ${done} ${isToday}" title="${key}"></div>`;
        }

        const todayLog = log[getToday()];
        const totalToday = todayLog ? Object.values(todayLog).reduce((a, b) => a + b, 0) : 0;

        return `
            <div class="streak-bar">
                <span class="streak-fire">&#128293;</span>
                <span class="streak-count">${streak}</span>日連続
                <span style="margin-left:8px;color:#666;">|</span>
                <span style="margin-left:8px;color:#666;">今日: ${totalToday ? totalToday + '問' : '未学習'}</span>
            </div>
            <div class="streak-calendar">${days}</div>`;
    }

    function updateStreakDisplay() {
        const el = document.getElementById('streakArea');
        if (el) el.innerHTML = renderStreakBar();
    }

    // --- SRS（忘却曲線） ---
    const SRS_INTERVALS = [0, 1, 3, 7, 14, 30, 60]; // 日数

    function loadSRS() {
        try { return JSON.parse(localStorage.getItem('eikaiwa_srs')) || {}; } catch { return {}; }
    }
    function saveSRS(data) {
        localStorage.setItem('eikaiwa_srs', JSON.stringify(data));
    }
    function getSRSKey(cat, ja) {
        return cat + '::' + ja;
    }
    function getSRSEntry(cat, ja) {
        const data = loadSRS();
        return data[getSRSKey(cat, ja)] || { streak: 0, nextReview: 0 };
    }
    function updateSRS(cat, ja, ok) {
        const data = loadSRS();
        const key = getSRSKey(cat, ja);
        const entry = data[key] || { streak: 0, nextReview: 0 };
        const now = Date.now();
        if (ok) {
            entry.streak = Math.min(entry.streak + 1, SRS_INTERVALS.length - 1);
        } else {
            entry.streak = 0;
        }
        const days = SRS_INTERVALS[entry.streak];
        entry.nextReview = now + days * 24 * 60 * 60 * 1000;
        data[key] = entry;
        saveSRS(data);
    }
    function isDue(cat, ja) {
        const entry = getSRSEntry(cat, ja);
        return Date.now() >= entry.nextReview;
    }
    function getDueCount(cat) {
        const words = VOCAB_DATA[cat];
        if (!words) return 0;
        return words.filter(w => isDue(cat, w.ja)).length;
    }
    function getAllDueWords() {
        const due = [];
        for (const cat of Object.keys(VOCAB_DATA)) {
            for (const word of VOCAB_DATA[cat]) {
                if (isDue(cat, word.ja)) {
                    due.push({ ...word, _cat: cat });
                }
            }
        }
        // 復習期限が早い順にソート
        const srs = loadSRS();
        due.sort((a, b) => {
            const ea = srs[getSRSKey(a._cat, a.ja)] || { nextReview: 0 };
            const eb = srs[getSRSKey(b._cat, b.ja)] || { nextReview: 0 };
            return ea.nextReview - eb.nextReview;
        });
        return due;
    }
    function getSRSLabel(cat, ja) {
        const entry = getSRSEntry(cat, ja);
        if (entry.streak === 0 && entry.nextReview === 0) return '新規';
        const days = SRS_INTERVALS[entry.streak];
        if (days === 0) return '今すぐ';
        if (days === 1) return '1日後';
        return days + '日後';
    }

    // --- 単語学習モード ---
    let vocabState = null;

    function initVocab() {
        const chatArea = document.getElementById('chatArea');
        const categories = Object.keys(VOCAB_DATA);
        const allDue = getAllDueWords().length;

        let catBtns = categories.map(cat => {
            const due = getDueCount(cat);
            const badge = due > 0 ? `<span class="vocab-due-badge">${due}</span>` : '';
            return `<button class="vocab-cat-btn" onclick="selectVocabCategory('${cat}')">${cat}${badge}</button>`;
        }).join('');

        const reviewBtn = allDue > 0
            ? `<button class="vocab-cat-btn" style="background:#e94560;border-color:#e94560;color:white;" onclick="startReview()">復習 <span class="vocab-due-badge" style="background:white;color:#e94560;">${allDue}</span></button>`
            : `<button class="vocab-cat-btn" style="opacity:0.5;cursor:default;">復習なし</button>`;

        chatArea.innerHTML = `
            <div style="padding:16px;text-align:center;color:#aaa;">カテゴリを選んでください</div>
            <div class="vocab-categories">${reviewBtn}${catBtns}</div>`;
    }

    function selectVocabCategory(cat) {
        const words = [...VOCAB_DATA[cat]];
        // 復習期限順にソート（期限切れ＝due が先、新規が先）
        const srs = loadSRS();
        words.sort((a, b) => {
            const ea = srs[getSRSKey(cat, a.ja)] || { nextReview: 0 };
            const eb = srs[getSRSKey(cat, b.ja)] || { nextReview: 0 };
            return ea.nextReview - eb.nextReview;
        });
        vocabState = { category: cat, words, index: 0, revealed: false, answered: false, isReview: false };
        renderVocabCard();
    }

    function startReview() {
        const due = getAllDueWords();
        if (due.length === 0) return;
        vocabState = { category: '復習', words: due, index: 0, revealed: false, answered: false, isReview: true };
        renderVocabCard();
    }

    function renderVocabCard() {
        const vs = vocabState;
        const word = vs.words[vs.index];
        const chatArea = document.getElementById('chatArea');
        const cat = vs.isReview ? (word._cat || vs.category) : vs.category;

        const categories = Object.keys(VOCAB_DATA);
        let catBtns = categories.map(c => {
            const due = getDueCount(c);
            const badge = due > 0 ? `<span class="vocab-due-badge">${due}</span>` : '';
            const active = !vs.isReview && c === vs.category ? 'active' : '';
            return `<button class="vocab-cat-btn ${active}" onclick="selectVocabCategory('${c}')">${c}${badge}</button>`;
        }).join('');

        const allDue = getAllDueWords().length;
        const reviewActive = vs.isReview ? 'active' : '';
        const reviewBtn = `<button class="vocab-cat-btn ${reviewActive}" style="${vs.isReview ? 'background:#e94560;border-color:#e94560;color:white;' : ''}" onclick="startReview()">復習 ${allDue > 0 ? `<span class="vocab-due-badge" style="${vs.isReview ? 'background:white;color:#e94560;' : ''}">${allDue}</span>` : ''}</button>`;

        // SRS情報
        const srsLabel = getSRSLabel(cat, word.ja);
        const srsInfo = `<div class="vocab-srs-info">次の復習: ${srsLabel}</div>`;

        // 答え表示
        let answerHtml = '';
        if (vs.revealed) {
            answerHtml = `
                <div class="vocab-en-list">
                    <div class="vocab-en-section">
                        <div class="section-label">シンプルな表現</div>
                        ${word.en.map(e => `<div class="vocab-en-item">
                            <span class="speak-icon" onclick="speak('${e.replace(/'/g, "\\'")}', 'en-US', ${settings.speed})">&#128264;</span>
                            ${escapeHtml(e)}
                        </div>`).join('')}
                    </div>
                    <div class="vocab-en-section">
                        <div class="section-label">ネイティブ表現</div>
                        ${word.native.map(e => `<div class="vocab-en-item">
                            <span class="speak-icon" onclick="speak('${e.replace(/'/g, "\\'")}', 'en-US', ${settings.speed})">&#128264;</span>
                            ${escapeHtml(e)}
                        </div>`).join('')}
                    </div>
                </div>`;
        }

        // OK/NG or 答えを見るボタン
        let actionHtml = '';
        if (!vs.revealed) {
            actionHtml = `
                <div style="text-align:center;margin-top:16px;">
                    <button class="vocab-reveal-btn" onclick="revealVocab()">答えを見る</button>
                </div>`;
        } else if (!vs.answered) {
            actionHtml = `
                <div class="vocab-okng">
                    <button class="btn-ng" onclick="vocabNG()">NG</button>
                    <button class="btn-ok" onclick="vocabOK()">OK</button>
                </div>`;
        }

        chatArea.innerHTML = `
            <div class="vocab-categories">${reviewBtn}${catBtns}</div>
            <div class="vocab-score">${vs.isReview ? '復習モード | ' : ''}${vs.index + 1} / ${vs.words.length}</div>
            <div class="vocab-card">
                <div class="vocab-ja">${escapeHtml(word.ja)}</div>
                ${actionHtml}
                ${answerHtml}
                ${vs.revealed ? srsInfo : ''}
            </div>
            <div class="vocab-nav">
                <button class="btn-prev" onclick="vocabPrev()" ${vs.index === 0 ? 'disabled' : ''}>&#9664; 前</button>
                <button class="btn-next" onclick="vocabNext()">${vs.index < vs.words.length - 1 ? '次 &#9654;' : '完了 &#10003;'}</button>
            </div>`;
    }

    function revealVocab() {
        vocabState.revealed = true;
        renderVocabCard();
    }

    function vocabOK() {
        const vs = vocabState;
        const word = vs.words[vs.index];
        const cat = vs.isReview ? (word._cat || vs.category) : vs.category;
        updateSRS(cat, word.ja, true);
        vs.answered = true;
        recordActivity('vocab', 1);
        updateStreakDisplay();
        renderVocabCard();
        // 自動で次へ
        setTimeout(() => vocabNext(), 500);
    }

    function vocabNG() {
        const vs = vocabState;
        const word = vs.words[vs.index];
        const cat = vs.isReview ? (word._cat || vs.category) : vs.category;
        updateSRS(cat, word.ja, false);
        vs.answered = true;
        recordActivity('vocab', 1);
        updateStreakDisplay();
        // NGの場合、リストの最後に再追加
        vs.words.push({ ...word, _cat: cat });
        renderVocabCard();
        setTimeout(() => vocabNext(), 500);
    }

    function vocabNext() {
        const vs = vocabState;
        if (vs.index < vs.words.length - 1) {
            vs.index++;
            vs.revealed = false;
            vs.answered = false;
        } else {
            // 全問完了 → カテゴリ選択に戻る
            vocabState = null;
            initVocab();
            return;
        }
        renderVocabCard();
    }

    function vocabPrev() {
        if (vocabState.index > 0) {
            vocabState.index--;
            vocabState.revealed = false;
            vocabState.answered = false;
            renderVocabCard();
        }
    }

    // --- 音声合成 ---
    function speak(text, lang, speed) {
        return new Promise((resolve) => {
            if (!('speechSynthesis' in window)) { resolve(); return; }
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = lang || 'en-US';
            utter.rate = speed || 1.0;

            // 適切な音声を選択
            const voices = window.speechSynthesis.getVoices();
            const match = voices.find(v => v.lang.startsWith(lang.substring(0, 2)));
            if (match) utter.voice = match;

            utter.onend = resolve;
            utter.onerror = resolve;
            window.speechSynthesis.speak(utter);
        });
    }

    // --- Groq API ---
    async function callGroq(msgs) {
        const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${settings.apiKey}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: msgs,
                stream: true,
            }),
        });

        if (!resp.ok) {
            const err = await resp.text();
            throw new Error(`API Error ${resp.status}: ${err}`);
        }
        return resp.body.getReader();
    }

    async function streamResponse(reader, onToken, onDone) {
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6).trim();
                if (data === '[DONE]') { onDone(); return; }
                try {
                    const json = JSON.parse(data);
                    const token = json.choices?.[0]?.delta?.content || '';
                    if (token) onToken(token);
                } catch {}
            }
        }
        onDone();
    }

    // --- UI ---
    function render() {
        const app = document.getElementById('app');
        if (!isAuthenticated()) {
            renderLogin(app);
        } else if (!settings.apiKey) {
            renderSetup(app);
        } else {
            renderChat(app);
        }
    }

    function renderSetup(app) {
        app.innerHTML = `
            <div class="setup">
                <div class="modal" style="position:static;">
                    <h2>英会話アプリ 初期設定</h2>
                    <label>Groq APIキー</label>
                    <input type="password" id="setup-key" placeholder="gsk_...">
                    <p style="font-size:12px;color:#888;margin:-10px 0 16px;">
                        <a href="https://console.groq.com" target="_blank" style="color:#e94560;">console.groq.com</a> で無料取得
                    </p>
                    <div class="btn-row">
                        <button class="btn-save" onclick="doSetup()">開始</button>
                    </div>
                </div>
            </div>`;
    }

    function doSetup() {
        const key = document.getElementById('setup-key').value.trim();
        if (!key) { alert('APIキーを入力してください'); return; }
        settings.apiKey = key;
        saveSettingsToStorage(settings);
        render();
    }

    function renderChat(app) {
        app.innerHTML = `
            <div class="header">
                <h1>英会話アプリ</h1>
                <button onclick="openSettings()">設定</button>
            </div>
            <div id="streakArea">${renderStreakBar()}</div>
            <div class="chat-area" id="chatArea"></div>
            <div class="input-area">
                <button id="micBtn" class="mic-btn" onclick="toggleMic()">&#127908;</button>
                <textarea id="userInput" rows="1" placeholder="メッセージを入力..."
                    onkeydown="handleKey(event)"></textarea>
                <button id="sendBtn" onclick="sendMessage()">&#9654;</button>
            </div>`;

        // 既存メッセージを再描画
        const chatArea = document.getElementById('chatArea');
        for (const msg of messages) {
            if (msg.role === 'user' || msg.role === 'assistant') {
                appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content);
            }
        }
        chatArea.scrollTop = chatArea.scrollHeight;

        // 特殊モード初期化
        if (settings.mode === 'drama' && !dramaState) {
            startDrama();
        } else if (settings.mode === 'vocab') {
            initVocab();
        }

        // textarea自動リサイズ
        const ta = document.getElementById('userInput');
        ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        });
    }

    function appendMessage(role, text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        const label = role === 'user' ? 'あなた' : 'AI';
        let speakBtn = '';
        if (role === 'ai') {
            speakBtn = `<button class="speak-btn" onclick="speakText(this)">&#128264; 再生</button>`;
        }
        div.innerHTML = `<div class="label">${label}</div><div class="text">${escapeHtml(text)}</div>${speakBtn}`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function speakText(btn) {
        const text = btn.parentElement.querySelector('.text').textContent;
        speak(text, settings.voiceLang, settings.speed);
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    async function sendMessage() {
        if (isGenerating) return;
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';

        // ドラマモードの場合は専用ハンドラへ
        if (settings.mode === 'drama' && dramaState) {
            handleDramaInput(text);
            return;
        }

        // ユーザーメッセージ追加
        appendMessage('user', text);

        // システムプロンプト初回設定
        if (messages.length === 0) {
            messages.push({ role: 'system', content: getSystemPrompt(settings.mode) });
        }
        messages.push({ role: 'user', content: text });

        // AI返信生成
        isGenerating = true;
        document.getElementById('sendBtn').disabled = true;

        const chatArea = document.getElementById('chatArea');
        const aiDiv = document.createElement('div');
        aiDiv.className = 'msg ai';
        aiDiv.innerHTML = '<div class="label">AI</div><div class="text"></div>';
        chatArea.appendChild(aiDiv);
        const textDiv = aiDiv.querySelector('.text');

        let fullReply = '';

        try {
            const reader = await callGroq(messages);
            await streamResponse(reader,
                (token) => {
                    fullReply += token;
                    textDiv.innerHTML = escapeHtml(fullReply);
                    chatArea.scrollTop = chatArea.scrollHeight;
                },
                () => {
                    // 完了時: 再生ボタン追加 & 自動音声再生
                    const speakBtn = document.createElement('button');
                    speakBtn.className = 'speak-btn';
                    speakBtn.innerHTML = '&#128264; 再生';
                    speakBtn.onclick = function() { speakText(this); };
                    aiDiv.appendChild(speakBtn);

                    messages.push({ role: 'assistant', content: fullReply });
                    recordActivity(settings.mode, 1);
                    updateStreakDisplay();

                    // 自動音声再生
                    speak(fullReply, settings.voiceLang, settings.speed);
                }
            );
        } catch (err) {
            textDiv.textContent = `[エラー] ${err.message}`;
        }

        isGenerating = false;
        document.getElementById('sendBtn').disabled = false;
    }

    // --- 設定モーダル ---
    function openSettings() {
        document.getElementById('s-apikey').value = settings.apiKey;
        document.getElementById('s-mode').value = settings.mode;
        document.getElementById('s-mic-lang').value = settings.micLang;
        document.getElementById('s-voice-lang').value = settings.voiceLang;
        document.getElementById('s-speed').value = settings.speed;
        document.getElementById('s-speed-label').textContent = settings.speed + 'x';
        document.getElementById('settingsModal').classList.add('active');
    }
    function closeSettings() {
        document.getElementById('settingsModal').classList.remove('active');
    }
    function doLogout() {
        localStorage.removeItem('eikaiwa_auth');
        closeSettings();
        messages = [];
        render();
    }
    function saveSettings() {
        settings.apiKey = document.getElementById('s-apikey').value.trim();
        settings.mode = document.getElementById('s-mode').value;
        settings.micLang = document.getElementById('s-mic-lang').value;
        settings.voiceLang = document.getElementById('s-voice-lang').value;
        settings.speed = parseFloat(document.getElementById('s-speed').value);
        saveSettingsToStorage(settings);

        // モード変更時は会話リセット
        messages = [];
        dramaState = null;
        vocabState = null;
        closeSettings();
        render();
    }

    document.getElementById('s-speed').addEventListener('input', (e) => {
        document.getElementById('s-speed-label').textContent = e.target.value + 'x';
    });

    // --- 音声入力 (Web Speech API) ---
    let recognition = null;
    let isRecording = false;
    let confirmedText = '';  // 確定済みテキスト（再開前の分を保持）

    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return null;
        const rec = new SpeechRecognition();
        rec.continuous = false;
        rec.interimResults = true;
        rec.lang = settings.micLang;

        rec.onresult = (e) => {
            const input = document.getElementById('userInput');
            if (!input) return;
            let final = '';
            let interim = '';
            for (let i = 0; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    final += e.results[i][0].transcript;
                } else {
                    interim += e.results[i][0].transcript;
                }
            }
            if (final) {
                confirmedText += (confirmedText ? ' ' : '') + final;
            }
            input.value = confirmedText + (interim ? (confirmedText ? ' ' : '') + interim : '');
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        };

        rec.onend = () => {
            // 手動停止でなければ自動再開（確定テキストは保持される）
            if (isRecording) {
                try { rec.start(); } catch {}
                return;
            }
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('recording');
        };

        rec.onerror = (e) => {
            isRecording = false;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('recording');
            if (e.error === 'not-allowed') {
                alert('マイクの使用が許可されていません。ブラウザの設定を確認してください。');
            }
        };

        return rec;
    }

    function toggleMic() {
        if (isGenerating) return;

        if (isRecording) {
            // 手動停止 → 送信
            isRecording = false;
            if (recognition) recognition.stop();
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('recording');
            // テキストがあれば送信
            const input = document.getElementById('userInput');
            if (input && input.value.trim()) {
                sendMessage();
            }
            return;
        }

        // 録音開始
        confirmedText = '';
        recognition = initRecognition();
        if (!recognition) {
            alert('お使いのブラウザは音声入力に対応していません。');
            return;
        }
        recognition.lang = settings.micLang;
        isRecording = true;
        const micBtn = document.getElementById('micBtn');
        if (micBtn) micBtn.classList.add('recording');
        recognition.start();
    }

    // 音声リスト読み込み（非同期）
    if ('speechSynthesis' in window) {
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    // 初期描画
    render();
    </script>
</body>
